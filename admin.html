<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Memorial Admin</title>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link
        href="https://fonts.googleapis.com/css2?family=Playfair+Display:wght@400;600&family=Cormorant+Garamond:wght@300;400;500;600&family=EB+Garamond:wght@400;500&display=swap"
        rel="stylesheet">
    <style>
        * {
            box-sizing: border-box;
            margin: 0;
            padding: 0;
        }

        :root {
            --gold: #b8934a;
            --gold-light: #d4b07a;
            --gold-pale: #f5e8cc;
            --cream: #faf6ee;
            --deep: #0d0a04;
            --brown: #3d2b0f;
            --sepia: #8b6f47;
            --border: rgba(184, 147, 74, 0.22);
            --border-strong: rgba(184, 147, 74, 0.5);
            --danger: #c87070;
            --success: #8fc47a;
        }

        body {
            font-family: 'EB Garamond', serif;
            background: var(--deep);
            color: var(--cream);
            min-height: 100vh;
            padding: 2rem 1rem 4rem;
        }

        .wrap {
            max-width: 1100px;
            margin: 0 auto;
        }

        .topbar {
            display: flex;
            justify-content: space-between;
            align-items: center;
            gap: 1rem;
            margin-bottom: 2rem;
            flex-wrap: wrap;
        }

        .title {
            font-family: 'Playfair Display', serif;
            color: var(--gold-pale);
            font-size: clamp(1.6rem, 3vw, 2.2rem);
        }

        .sub {
            color: var(--sepia);
            font-family: 'Cormorant Garamond', serif;
            font-style: italic;
            margin-top: .35rem;
        }

        .section {
            margin-top: 2rem;
        }

        .section h2 {
            font-family: 'Playfair Display', serif;
            font-weight: 400;
            color: var(--gold-pale);
            margin-bottom: 1rem;
        }

        .grid {
            display: grid;
            grid-template-columns: repeat(auto-fill, minmax(300px, 1fr));
            gap: 16px;
        }

        .card {
            border: 0.5px solid var(--border);
            background: rgba(20, 14, 4, 0.6);
            padding: 1rem;
        }

        .meta {
            color: var(--gold-light);
            font-family: 'Cormorant Garamond', serif;
            margin-bottom: .6rem;
        }

        .text {
            color: rgba(245, 232, 204, 0.86);
            line-height: 1.6;
        }

        .actions {
            display: flex;
            gap: .6rem;
            margin-top: 1rem;
            flex-wrap: wrap;
        }

        button {
            border: 0.5px solid var(--gold);
            background: transparent;
            color: var(--gold-pale);
            padding: .65rem 1rem;
            cursor: pointer;
            font-family: 'Cormorant Garamond', serif;
            letter-spacing: 1px;
            transition: .2s ease;
        }

        button:hover {
            background: var(--gold);
            color: var(--deep);
        }

        .danger {
            border-color: var(--danger);
            color: #efb1b1;
        }

        .danger:hover {
            background: var(--danger);
            color: white;
        }

        .muted {
            color: var(--sepia);
            font-style: italic;
            padding: 1rem 0;
            font-family: 'Cormorant Garamond', serif;
        }

        .thumb {
            width: 100%;
            aspect-ratio: 1;
            object-fit: cover;
            display: block;
            background: #1a1208;
            margin-bottom: .8rem;
        }

        .pill {
            display: inline-block;
            border: 0.5px solid var(--border-strong);
            color: var(--gold-light);
            font-size: .85rem;
            padding: .2rem .5rem;
            margin-bottom: .6rem;
        }

        .row {
            display: flex;
            gap: .8rem;
            align-items: center;
            flex-wrap: wrap;
        }

        .refresh-btn {
            min-width: 120px;
        }
    </style>
</head>

<body>
    <div class="wrap">
        <div class="topbar">
            <div>
                <div class="title">Memorial Admin</div>
                <div class="sub">Approve or remove tributes and gallery uploads</div>
            </div>
            <button class="refresh-btn" onclick="refreshAdmin()">Refresh</button>
        </div>

        <div class="section">
            <h2>Pending Tributes</h2>
            <div id="pending-tributes" class="grid"></div>
        </div>

        <div class="section">
            <h2>Pending Media</h2>
            <div id="pending-media" class="grid"></div>
        </div>

        <div class="section">
            <h2>Approved Tributes</h2>
            <div id="approved-tributes" class="grid"></div>
        </div>

        <div class="section">
            <h2>Approved Media</h2>
            <div id="approved-media" class="grid"></div>
        </div>
    </div>

    <script type="module" src="admin.js"></script>
</body>

</html>
